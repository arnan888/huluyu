
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>老虎机 | 功能区域适配</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0a0a12;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .app {
            width: 500px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .panel-top {
            flex: 37.5;
            background: url('slot-top.jpg') center/cover no-repeat;
        }
        .panel-mid {
            flex: 28.1;
            background: url('slot-mid.png') center/cover no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            position: relative;
        }
        .panel-bottom {
            flex: 34.4;
            background: url('slot-bottom.jpg') center/cover no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 12px;
            /* 移除任何可能干扰的样式 */
            box-shadow: none;
            border: none;
        }
        .reel {
            width: 90px;
            height: 120px;
            background: rgba(0,0,0,0.5);
            overflow: hidden;
        }
        .reel-strip {
            display: flex;
            flex-direction: column;
            transition: transform 0.05s linear;
        }
        .reel-item {
            width: 90px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .reel-img {
            width: 75px;
            height: 75px;
            object-fit: contain;
        }
        .win-line {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, #ffd700, #ffaa33, #ffd700, transparent);
            pointer-events: none;
            transform: translateY(-50%);
        }
        /* 底部功能区域布局 - 适配背景图设计 */
        .info {
            display: flex;
            justify-content: space-around;
            width: 80%;
            background: rgba(0,0,0,0.45);
            padding: 8px 0;
            color: #ffd966;
            font-size: 0.8rem;
            text-align: center;
        }
        .info div {
            flex: 1;
        }
        .info span {
            font-weight: bold;
            margin-left: 4px;
        }
        .bet {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            background: rgba(0,0,0,0.45);
            padding: 8px 20px;
        }
        .bet button {
            background: #2a2a3a;
            border: none;
            width: 40px;
            height: 40px;
            font-size: 1.4rem;
            font-weight: bold;
            color: #ffd966;
            cursor: pointer;
        }
        .bet button:active {
            transform: translateY(1px);
        }
        .bet span {
            font-size: 1.2rem;
            font-weight: bold;
            color: #ffd966;
            min-width: 60px;
            text-align: center;
        }
        .spin {
            background: #ffcf6e;
            border: none;
            width: 160px;
            padding: 10px 0;
            font-size: 1.2rem;
            font-weight: bold;
            color: #2d1e09;
            cursor: pointer;
            margin-top: 4px;
        }
        .spin:active {
            transform: translateY(2px);
        }
        /* 强制无圆角 */
        .reel, .info, .bet, .spin, .panel-top, .panel-mid, .panel-bottom {
            border-radius: 0px;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="panel-top"></div>
    <div class="panel-mid">
        <div class="reel" id="reel0"><div class="reel-strip" id="strip0"></div></div>
        <div class="reel" id="reel1"><div class="reel-strip" id="strip1"></div></div>
        <div class="reel" id="reel2"><div class="reel-strip" id="strip2"></div></div>
        <div class="win-line"></div>
    </div>
    <div class="panel-bottom">
        <div class="info">
            <div>💰 余额 <span id="balance">1000</span></div>
            <div>🏆 得分 <span id="score">0</span></div>
            <div>🎲 押分 <span id="betAmount">20</span></div>
        </div>
        <div class="bet">
            <button id="minus">−</button>
            <span id="betValue">20</span>
            <button id="plus">+</button>
        </div>
        <button class="spin" id="spinBtn">🎰 旋转 🎰</button>
    </div>
</div>

<script>
    const TIGERS = {
        green: { name:'绿虎', color:'green', img:'tiger-green.png', mult:28 },
        red:   { name:'红虎', color:'red',   img:'tiger-red.png',   mult:58 },
        gold:  { name:'金虎', color:'gold',  img:'tiger-gold.png',  mult:88 }
    };
    const LIST = [TIGERS.green, TIGERS.red, TIGERS.gold];
    function rand() { return LIST[Math.floor(Math.random()*3)]; }
    function makeStrip() { return [rand(), rand(), rand()]; }

    let strips = [makeStrip(), makeStrip(), makeStrip()];
    let offsets = [1,1,1];
    let balance = 1000, score = 0, bet = 20;
    let spinning = false;

    const stripDivs = [document.getElementById('strip0'), document.getElementById('strip1'), document.getElementById('strip2')];
    const balanceSpan = document.getElementById('balance');
    const scoreSpan = document.getElementById('score');
    const betAmountSpan = document.getElementById('betAmount');
    const betValueSpan = document.getElementById('betValue');
    const minusBtn = document.getElementById('minus');
    const plusBtn = document.getElementById('plus');
    const spinBtn = document.getElementById('spinBtn');

    function renderReel(i) {
        const s = strips[i];
        const div = stripDivs[i];
        div.innerHTML = '';
        for(let j=0;j<3;j++) {
            const item = document.createElement('div');
            item.className = 'reel-item';
            const img = document.createElement('img');
            img.className = 'reel-img';
            img.src = s[j].img;
            item.appendChild(img);
            div.appendChild(item);
        }
        div.style.transform = `translateY(${-offsets[i]*120}px)`;
    }

    function updateUI() {
        balanceSpan.innerText = balance;
        scoreSpan.innerText = score;
        betAmountSpan.innerText = bet;
        betValueSpan.innerText = bet;
    }

    async function spin() {
        if(spinning) return;
        if(balance < bet) { alert('余额不足'); return; }
        spinning = true;
        balance -= bet;
        updateUI();

        const finalStrips = [makeStrip(), makeStrip(), makeStrip()];
        const finalOffsets = [1,1,1];
        const delays = [0, 500, 1000];
        let done = 0;

        function startReel(idx, delay) {
            setTimeout(() => {
                let frames = 0;
                const maxFrames = 12;
                function step() {
                    if(frames < maxFrames) {
                        offsets[idx] = (offsets[idx] + 1) % 3;
                        renderReel(idx);
                        frames++;
                        requestAnimationFrame(step);
                    } else {
                        strips[idx] = finalStrips[idx];
                        offsets[idx] = finalOffsets[idx];
                        renderReel(idx);
                        done++;
                        if(done === 3) {
                            const t0 = strips[0][1];
                            const t1 = strips[1][1];
                            const t2 = strips[2][1];
                            let mult = (t0.color===t1.color && t1.color===t2.color) ? t0.mult : 8;
                            let win = bet * mult;
                            if(win>0) {
                                balance += win;
                                score += win;
                                // 无弹窗
                            }
                            updateUI();
                            spinning = false;
                        }
                    }
                }
                step();
            }, delay);
        }

        startReel(0, delays[0]);
        startReel(1, delays[1]);
        startReel(2, delays[2]);
    }

    minusBtn.onclick = () => { if(bet>10) { bet-=10; updateUI(); } };
    plusBtn.onclick = () => { if(bet<500) { bet+=10; updateUI(); } };
    spinBtn.onclick = spin;

    for(let i=0;i<3;i++) renderReel(i);
    updateUI();
</script>
</body>
</html>
