<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a12;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .app {
            width: 100%;
            max-width: 500px;
            background: #0f0f1a;
            display: flex;
            flex-direction: column;
            min-height: 100dvh;
        }
        /* 上区块 37.5% */
        .panel-top {
            max-width: 4950px;
            flex: 37.5;
            background: url('slot-top.jpg') center/cover no-repeat;
        }
        /* 中区块 28.1% - 老虎机区域 */
        .panel-mid {
            max-width: 490px;
            flex: 28.1;
            background: url('slot-mid.png') center/cover no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            position: relative;
        }
        .slot {
            width: 90px;
            height: 120px;
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 0 2px #ffd96688;
        }
        .tiger-img {
            width: 75px;
            height: 75px;
            object-fit: contain;
        }
        /* 固定中奖线 */
        .win-line {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, #ffd700, #ffaa33, #ffd700, transparent);
            transform: translateY(-50%);
            pointer-events: none;
        }
        /* 下区块 34.4% - 控制区 */
        .panel-bottom {
            max-width: 490px;
            flex: 34.4;
            background: url('slot-bottom.jpg') center/cover no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 12px;
            padding: 20px;
        }
        /* 余额、得分、总押分显示框 */
        .info-row {
            display: flex;
            gap: 20px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            padding: 8px 20px;
            border-radius: 60px;
        }
        .info-item {
            text-align: center;
            color: #ffd966;
            font-size: 0.8rem;
        }
        .info-value {
            font-weight: bold;
            font-size: 1.1rem;
            margin-left: 6px;
        }
        /* 押分控制区 */
        .bet-control {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(0,0,0,0.6);
            padding: 5px 16px;
            border-radius: 60px;
        }
        /* 按钮图片 */
        .btn-minus {
            background: url('btn-minus.png') center/cover no-repeat;
            width: 40px;
            height: 40px;
            border: none;
            cursor: pointer;
        }
        .btn-plus {
            background: url('btn-plus.png') center/cover no-repeat;
            width: 40px;
            height: 40px;
            border: none;
            cursor: pointer;
        }
        .btn-spin {
            background: url('btn-spin.png') center/cover no-repeat;
            width: 160px;
            height: 50px;
            border: none;
            cursor: pointer;
        }
        .btn-minus:active, .btn-plus:active, .btn-spin:active {
            transform: scale(0.96);
        }
        .version {
            font-size: 0.55rem;
            color: #ffcc8844;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="panel-top"></div>
    <div class="panel-mid">
        <div class="slot"><img class="tiger-img" id="tiger0" src="tiger-green.png" alt="虎"></div>
        <div class="slot"><img class="tiger-img" id="tiger1" src="tiger-green.png" alt="虎"></div>
        <div class="slot"><img class="tiger-img" id="tiger2" src="tiger-green.png" alt="虎"></div>
        <div class="win-line"></div>
    </div>
    <div class="panel-bottom">
        <!-- 余额、得分、总押分显示框 -->
        <div class="info-row">
            <div class="info-item">💰 余额 <span class="info-value" id="balance">1000</span></div>
            <div class="info-item">🏆 得分 <span class="info-value" id="score">0</span></div>
            <div class="info-item">🎲 总押分 <span class="info-value" id="totalBet">20</span></div>
        </div>
        <!-- 加减押分按钮 -->
        <div class="bet-control">
            <button class="btn-minus" id="minusBet"></button>
            <div style="color:#ffd966; min-width:60px; text-align:center;" id="betAmount">20</div>
            <button class="btn-plus" id="plusBet"></button>
        </div>
        <!-- 旋转按钮 -->
        <button class="btn-spin" id="spinBtn"></button>
        <div class="version">v.img</div>
    </div>
</div>

<script>
    // 老虎配置
    const TIGERS = {
        green: { name:'绿虎', color:'green', img:'tiger-green.png', mult:28 },
        red:   { name:'红虎', color:'red',   img:'tiger-red.png',   mult:58 },
        gold:  { name:'金虎', color:'gold',  img:'tiger-gold.png',  mult:88 }
    };
    const TIGER_LIST = [TIGERS.green, TIGERS.red, TIGERS.gold];
    function randomTiger() { return TIGER_LIST[Math.floor(Math.random()*3)]; }

    // DOM 元素
    const tigerImgs = [
        document.getElementById('tiger0'),
        document.getElementById('tiger1'),
        document.getElementById('tiger2')
    ];
    const balanceSpan = document.getElementById('balance');
    const scoreSpan = document.getElementById('score');
    const totalBetSpan = document.getElementById('totalBet');
    const betAmountSpan = document.getElementById('betAmount');
    const spinBtn = document.getElementById('spinBtn');
    const minusBtn = document.getElementById('minusBet');
    const plusBtn = document.getElementById('plusBet');

    let balance = 1000;
    let currentScore = 0;
    let bet = 20;
    let isSpinning = false;

    function updateUI() {
        balanceSpan.innerText = balance;
        scoreSpan.innerText = currentScore;
        totalBetSpan.innerText = bet;
        betAmountSpan.innerText = bet;
    }

    function setTigers(t0, t1, t2) {
        tigerImgs[0].src = t0.img;
        tigerImgs[1].src = t1.img;
        tigerImgs[2].src = t2.img;
    }

    // 中奖倍率：三个相同颜色取对应倍率，否则 8 倍
    function getMultiplier(t1, t2, t3) {
        if (t1.color === t2.color && t2.color === t3.color) {
            return t1.mult;
        }
        return 8;
    }

    async function spin() {
        if (isSpinning) return;
        if (balance < bet) {
            alert('余额不足');
            return;
        }
        isSpinning = true;
        spinBtn.disabled = true;
        minusBtn.disabled = true;
        plusBtn.disabled = true;

        balance -= bet;
        updateUI();

        let steps = 0;
        const MAX_STEPS = 12;
        const finalTigers = [randomTiger(), randomTiger(), randomTiger()];

        const interval = setInterval(() => {
            // 滚动动画：随机变化
            setTigers(randomTiger(), randomTiger(), randomTiger());
            steps++;
            if (steps >= MAX_STEPS) {
                clearInterval(interval);
                // 停止在最终结果
                setTigers(finalTigers[0], finalTigers[1], finalTigers[2]);
                const multiplier = getMultiplier(finalTigers[0], finalTigers[1], finalTigers[2]);
                const winAmount = bet * multiplier;
                if (winAmount > 0) {
                    balance += winAmount;
                    currentScore += winAmount;
                    updateUI();
                    alert(`🎉 中奖 ${winAmount} 分 (${multiplier}倍) ${finalTigers[0].name} ${finalTigers[1].name} ${finalTigers[2].name}`);
                } else {
                    alert(`😞 未中奖 ${finalTigers[0].name} ${finalTigers[1].name} ${finalTigers[2].name}`);
                }
                isSpinning = false;
                spinBtn.disabled = false;
                minusBtn.disabled = false;
                plusBtn.disabled = false;
            }
        }, 65);
    }

    // 押分调整
    minusBtn.addEventListener('click', () => {
        if (bet > 10) bet -= 10;
        updateUI();
    });
    plusBtn.addEventListener('click', () => {
        if (bet < 500) bet += 10;
        updateUI();
    });
    spinBtn.addEventListener('click', spin);

    // 初始化
    setTigers(randomTiger(), randomTiger(), randomTiger());
    updateUI();
</script>
</body>
</html>
