
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>老虎机</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #0a0a12;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .app {
            width: 500px;
            background: #0f0f1a;
        }
        .panel-top {
            width: 500px;
            height: 375px;
            background: url('slot-top.jpg') center/cover no-repeat;
        }
        .panel-mid {
            width: 500px;
            height: 281px;
            background: url('slot-mid.png') center/cover no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            position: relative;
        }
        .reel {
            width: 90px;
            height: 120px;
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: inset 0 0 0 2px #ffd96688;
        }
        .reel-strip {
            display: flex;
            flex-direction: column;
            transition: transform 0.05s linear;
        }
        .reel-item {
            width: 90px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .reel-img {
            width: 75px;
            height: 75px;
            object-fit: contain;
        }
        .win-line {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, #ffd700, #ffaa33, #ffd700, transparent);
            pointer-events: none;
            transform: translateY(-50%);
        }
        .panel-bottom {
            width: 500px;
            height: 282px;
            background: url('slot-bottom.jpg') center/cover no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 12px;
        }
        .info {
            display: flex;
            gap: 20px;
            background: rgba(0,0,0,0.6);
            padding: 8px 20px;
            border-radius: 60px;
            color: #ffd966;
            font-size: 0.8rem;
        }
        .info span {
            font-weight: bold;
            margin-left: 6px;
        }
        .bet {
            display: flex;
            gap: 15px;
            background: rgba(0,0,0,0.6);
            padding: 5px 16px;
            border-radius: 60px;
        }
        .bet button {
            background: #2a2a3a;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.4rem;
            font-weight: bold;
            color: #ffd966;
            cursor: pointer;
        }
        .spin {
            background: radial-gradient(circle at 30% 20%, #ffcf6e, #be691f);
            border: none;
            width: 160px;
            padding: 10px 0;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 60px;
            color: #2d1e09;
            box-shadow: 0 4px 0 #784818;
            cursor: pointer;
        }
        .spin:active { transform: translateY(2px); box-shadow: 0 1px 0 #784818; }
    </style>
</head>
<body>
<div class="app">
    <div class="panel-top"></div>
    <div class="panel-mid">
        <div class="reel" id="reel0"><div class="reel-strip" id="strip0"></div></div>
        <div class="reel" id="reel1"><div class="reel-strip" id="strip1"></div></div>
        <div class="reel" id="reel2"><div class="reel-strip" id="strip2"></div></div>
        <div class="win-line"></div>
    </div>
    <div class="panel-bottom">
        <div class="info"><div>💰 余额 <span id="balance">1000</span></div><div>🏆 得分 <span id="score">0</span></div><div>🎲 押分 <span id="betAmount">20</span></div></div>
        <div class="bet"><button id="minus">−</button><span style="width:60px;text-align:center;color:#ffd966;">20</span><button id="plus">+</button></div>
        <button class="spin" id="spin">🎰 旋转 🎰</button>
    </div>
</div>

<script>
    const TIGERS = {
        green: { name:'绿虎', color:'green', img:'tiger-green.png', mult:28 },
        red:   { name:'红虎', color:'red',   img:'tiger-red.png',   mult:58 },
        gold:  { name:'金虎', color:'gold',  img:'tiger-gold.png',  mult:88 }
    };
    const LIST = [TIGERS.green, TIGERS.red, TIGERS.gold];
    function rand() { return LIST[Math.floor(Math.random()*3)]; }
    function strip() { return [rand(), rand(), rand()]; }

    let data = [strip(), strip(), strip()];
    let pos = [1,1,1]; // 当前显示中间索引
    let balance = 1000, score = 0, bet = 20;
    let spinning = false;

    const stripsDOM = [document.getElementById('strip0'), document.getElementById('strip1'), document.getElementById('strip2')];
    function render(i) {
        const s = data[i];
        const dom = stripsDOM[i];
        dom.innerHTML = '';
        for(let j=0;j<3;j++) {
            const d = document.createElement('div');
            d.className = 'reel-item';
            const img = document.createElement('img');
            img.className = 'reel-img';
            img.src = s[j].img;
            d.appendChild(img);
            dom.appendChild(d);
        }
        dom.style.transform = `translateY(${-pos[i]*120}px)`;
    }
    function updateUI() {
        document.getElementById('balance').innerText = balance;
        document.getElementById('score').innerText = score;
        document.getElementById('betAmount').innerText = bet;
        document.querySelector('.bet span').innerText = bet;
    }

    function spin() {
        if(spinning) return;
        if(balance < bet) { alert('余额不足'); return; }
        spinning = true;
        balance -= bet;
        updateUI();
        // 左中右依次停止的时间(ms)
        const times = [600, 1000, 1400];
        const finalStrips = [strip(), strip(), strip()];
        const finalPos = [1,1,1];
        let stopCount = 0;

        function startReel(idx) {
            let frame = 0;
            const maxFrame = 12;
            function step() {
                if(frame < maxFrame) {
                    // 随机改变位置（模拟滚动）
                    pos[idx] = (pos[idx] + 1) % 3;
                    render(idx);
                    frame++;
                    requestAnimationFrame(step);
                } else {
                    // 停止：固定最终结果
                    data[idx] = finalStrips[idx];
                    pos[idx] = finalPos[idx];
                    render(idx);
                    stopCount++;
                    if(stopCount === 3) {
                        const t0 = data[0][1], t1 = data[1][1], t2 = data[2][1];
                        let mult = (t0.color===t1.color && t1.color===t2.color) ? t0.mult : 8;
                        let win = bet * mult;
                        if(win>0) {
                            balance += win;
                            score += win;
                            alert(`中奖 ${win} 分`);
                        } else {
                            alert(`未中奖`);
                        }
                        updateUI();
                        spinning = false;
                    }
                }
            }
            setTimeout(step, 50);
        }

        startReel(0);
        setTimeout(() => startReel(1), times[0]);
        setTimeout(() => startReel(2), times[1]);
    }

    document.getElementById('minus').onclick = () => { if(bet>10) { bet-=10; updateUI(); } };
    document.getElementById('plus').onclick = () => { if(bet<500) { bet+=10; updateUI(); } };
    document.getElementById('spin').onclick = spin;

    for(let i=0;i<3;i++) render(i);
    updateUI();
</script>
</body>
</html>
