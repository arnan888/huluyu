<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>帝王老虎机 | 绿宝石旋转</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            margin: 0;
            padding: 20px;
        }

        /* 主容器 800x800 */
        .app {
            width: 800px;
            height: 800px;
            background: linear-gradient(145deg, #1a1a2a, #0f0f1a);
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* ========== 顶部UI区 300px ========== */
        .top-area {
            height: 300px;
            background: linear-gradient(135deg, #0a0a12, #12121c);
            padding: 20px;
            display: flex;
            flex-direction: column;
            border-bottom: 2px solid #ffd70033;
        }

        .game-title {
            text-align: center;
            margin-bottom: 10px;
        }
        .game-title h1 {
            color: #ffd700;
            font-size: 1.5rem;
            margin: 0;
            text-shadow: 0 0 10px #ffaa33;
            letter-spacing: 4px;
        }
        .game-title p {
            color: #ffcc88;
            font-size: 0.7rem;
            margin: 5px 0 0;
        }

        .jackpot-area {
            background: #00000055;
            border-radius: 30px;
            padding: 12px;
            text-align: center;
            margin-bottom: 10px;
        }
        .jackpot-label {
            color: #ffaa66;
            font-size: 0.7rem;
            letter-spacing: 2px;
        }
        .jackpot-value {
            color: #ffd700;
            font-size: 1.6rem;
            font-weight: bold;
            text-shadow: 0 0 5px #ff6600;
        }

        .guide-text {
            background: #00000044;
            border-radius: 20px;
            padding: 8px;
            font-size: 0.7rem;
            color: #ddccaa;
            text-align: center;
            display: flex;
            justify-content: space-around;
        }
        .guide-text span {
            color: #ffcc66;
        }

        /* ========== 中间开奖动画区 200px ========== */
        .middle-area {
            height: 200px;
            background: #0a0a0a;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid #ffd70033;
        }

        /* 三个滚轮容器 */
        .reels-wrapper {
            display: flex;
            gap: 1px;           /* 1px 间隔 */
            background: #ffd70033;
            padding: 0;
            border-radius: 20px;
        }

        .reel {
            width: 199px;       /* 199px 三个正好 600px */
            height: 180px;      /* 中间区域高度200，留上下边距 */
            background: #0f0b04;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 0 0 1px #6e4f25;
        }

        .reel-strip {
            display: flex;
            flex-direction: column;
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            will-change: transform;
        }

        .tiger-item {
            width: 199px;
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tiger-item img {
            width: 140px;
            height: 140px;
            object-fit: contain;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5));
        }

        /* 中线（金线）在老虎后面 */
        .center-line {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, #ffd700, #ffaa33, #ffd700, transparent);
            box-shadow: 0 0 8px #ffaa66;
            transform: translateY(-50%);
            z-index: 5;
            pointer-events: none;
        }

        /* ========== 底部操控区 300px ========== */
        .bottom-area {
            height: 300px;
            background: linear-gradient(145deg, #12121c, #0a0a12);
            padding: 15px 20px;
            display: flex;
            flex-direction: column;
        }

        /* 三个显示框 70px高 */
        .stats-row {
            display: flex;
            gap: 1px;
            background: #ffd70033;
            height: 70px;
            margin-bottom: 15px;
        }
        .stat-box {
            width: 199px;
            background: #00000088;
            backdrop-filter: blur(4px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
            box-shadow: inset 0 0 0 1px #ffd70044;
        }
        .stat-label {
            font-size: 0.65rem;
            color: #ffcc88;
        }
        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffd700;
        }

        /* 按钮行 */
        .buttons-row {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 15px;
        }
        .small-btn {
            background: #2a2a3a;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            color: #ffdd99;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 3px 0 #1a1a2a;
            transition: 0.05s linear;
            flex: 1;
        }
        .small-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #1a1a2a; }

        /* 中央帝王绿球体区域 */
        .main-button-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-top: 5px;
        }
        .adjust-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #333344;
            border: none;
            font-size: 2rem;
            font-weight: bold;
            color: #ffdd99;
            cursor: pointer;
            box-shadow: 0 4px 0 #1a1a2a;
            transition: 0.05s linear;
        }
        .adjust-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #1a1a2a; }

        /* 帝王绿球体 */
        .spin-main {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #2a8a4a, #0a4a2a);
            border: 4px solid #ffd700;
            box-shadow: 0 0 20px #ffd70066, 0 8px 15px black;
            cursor: pointer;
            transition: 0.07s linear;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            font-weight: bold;
            color: #ffefb0;
            text-shadow: 0 0 5px #ffaa33;
        }
        .spin-main:active { transform: scale(0.96); box-shadow: 0 0 30px #ffaa33; }

        .auto-btn {
            background: #2a2a3a;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            color: #ffdd99;
            font-weight: bold;
            cursor: pointer;
        }

        /* 历史弹窗 */
        .history-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
        }
        .history-modal.show {
            visibility: visible;
        }
        .history-content {
            background: #1e1e2e;
            border-radius: 40px;
            padding: 20px;
            width: 400px;
            max-height: 500px;
            overflow-y: auto;
            border: 2px solid #ffd700;
        }
        .history-list {
            list-style: none;
            padding: 0;
        }
        .history-list li {
            padding: 8px;
            border-bottom: 1px solid #ffd70044;
            color: #ffdd99;
        }
        .close-history {
            margin-top: 15px;
            padding: 8px;
            background: #ffd700;
            border: none;
            border-radius: 30px;
            width: 100%;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="app">
    <!-- 顶部UI区 300px -->
    <div class="top-area">
        <div class="game-title">
            <h1>🐅 帝王虎啸 🐅</h1>
            <p>三虎连珠 · 绿红金同色中奖</p>
        </div>
        <div class="jackpot-area">
            <div class="jackpot-label">💎 当前大奖池 💎</div>
            <div class="jackpot-value" id="jackpot">8888</div>
        </div>
        <div class="guide-text">
            <span>🐯 绿虎 28倍</span> 
            <span>🐅 红虎 58倍</span> 
            <span>👑 金虎 88倍</span>
        </div>
    </div>

    <!-- 中间开奖动画区 200px -->
    <div class="middle-area">
        <div class="reels-wrapper" id="reelsWrapper">
            <!-- 三个滚轮 JS 生成 -->
        </div>
        <div class="center-line"></div>
    </div>

    <!-- 底部操控区 300px -->
    <div class="bottom-area">
        <div class="stats-row">
            <div class="stat-box"><span class="stat-label">💰 余额</span><span class="stat-value" id="balance">1000</span></div>
            <div class="stat-box"><span class="stat-label">🏆 得分</span><span class="stat-value" id="score">0</span></div>
            <div class="stat-box"><span class="stat-label">🎲 总押分</span><span class="stat-value" id="totalBet">20</span></div>
        </div>
        <div class="buttons-row">
            <button class="small-btn" id="historyBtn">📜 历史记录</button>
            <button class="small-btn" id="speedBtn">⚡ 加速</button>
            <button class="small-btn" id="autoBtn">🔄 自动旋转</button>
        </div>
        <div class="main-button-area">
            <button class="adjust-btn" id="minusBet">-</button>
            <div class="spin-main" id="spinBtn">🎰</div>
            <button class="adjust-btn" id="plusBet">+</button>
        </div>
    </div>
</div>

<!-- 历史弹窗 -->
<div id="historyModal" class="history-modal">
    <div class="history-content">
        <h3 style="color:#ffd700">📜 开奖记录</h3>
        <ul class="history-list" id="historyList"></ul>
        <button class="close-history" id="closeHistory">关闭</button>
    </div>
</div>

<script>
    // ========== 虎头配置 ==========
    const TIGER_IMAGES = {
        green: 'tiger-green.png',
        red: 'tiger-red.png',
        gold: 'tiger-gold.png'
    };
    const TIGER_TYPES = [
        { name: '绿虎', color: 'green', imgSrc: TIGER_IMAGES.green, multiplier: 28 },
        { name: '红虎', color: 'red', imgSrc: TIGER_IMAGES.red, multiplier: 58 },
        { name: '金虎', color: 'gold', imgSrc: TIGER_IMAGES.gold, multiplier: 88 }
    ];

    // 每个滚轮有2个虎头（上下各一个，中间空位由滚动决定）
    // 实际为了滚动效果，每个滚轮准备3个虎头（上中下），停止时只显示中间那个
    function generateReelStrip() {
        return [
            TIGER_TYPES[Math.floor(Math.random() * 3)],
            TIGER_TYPES[Math.floor(Math.random() * 3)],
            TIGER_TYPES[Math.floor(Math.random() * 3)]
        ];
    }

    let reelsData = [generateReelStrip(), generateReelStrip(), generateReelStrip()];
    let currentIndex = [1, 1, 1];  // 当前显示的中间索引
    let balance = 1000;
    let currentScore = 0;
    let betAmount = 20;
    let isSpinning = false;
    let autoSpin = false;
    let spinSpeed = 70;      // 毫秒
    let historyRecords = [];

    // DOM 元素
    const reelsWrapper = document.getElementById('reelsWrapper');
    const balanceSpan = document.getElementById('balance');
    const scoreSpan = document.getElementById('score');
    const totalBetSpan = document.getElementById('totalBet');
    const spinBtn = document.getElementById('spinBtn');
    const minusBetBtn = document.getElementById('minusBet');
    const plusBetBtn = document.getElementById('plusBet');
    const speedBtn = document.getElementById('speedBtn');
    const autoBtn = document.getElementById('autoBtn');
    const historyBtn = document.getElementById('historyBtn');
    const historyModal = document.getElementById('historyModal');
    const historyList = document.getElementById('historyList');
    const closeHistory = document.getElementById('closeHistory');

    let reelStrips = [];

    function renderReels() {
        reelsWrapper.innerHTML = '';
        reelStrips = [];
        for (let i = 0; i < 3; i++) {
            const reelDiv = document.createElement('div');
            reelDiv.className = 'reel';
            const stripDiv = document.createElement('div');
            stripDiv.className = 'reel-strip';
            for (let j = 0; j < 3; j++) {
                const tiger = reelsData[i][j];
                const itemDiv = document.createElement('div');
                itemDiv.className = 'tiger-item';
                const img = document.createElement('img');
                img.src = tiger.imgSrc;
                img.alt = tiger.name;
                itemDiv.appendChild(img);
                stripDiv.appendChild(itemDiv);
            }
            reelDiv.appendChild(stripDiv);
            reelsWrapper.appendChild(reelDiv);
            reelStrips.push(stripDiv);
        }
        updateReelOffset(0, 1);
        updateReelOffset(1, 1);
        updateReelOffset(2, 1);
    }

    function updateReelOffset(reelIdx, middleIdx) {
        if (!reelStrips[reelIdx]) return;
        const itemHeight = 180;
        const offsetY = -(middleIdx * itemHeight);
        reelStrips[reelIdx].style.transform = `translateY(${offsetY}px)`;
    }

    function getCurrentTigers() {
        return [
            reelsData[0][currentIndex[0]],
            reelsData[1][currentIndex[1]],
            reelsData[2][currentIndex[2]]
        ];
    }

    function calculateWin(tigers) {
        const c1 = tigers[0].color, c2 = tigers[1].color, c3 = tigers[2].color;
        if (c1 === c2 && c2 === c3) {
            if (c1 === 'green') return 28;
            if (c1 === 'red') return 58;
            if (c1 === 'gold') return 88;
        }
        return 0;
    }

    function addHistory(record) {
        historyRecords.unshift(record);
        if (historyRecords.length > 20) historyRecords.pop();
        renderHistory();
    }

    function renderHistory() {
        historyList.innerHTML = '';
        historyRecords.forEach(rec => {
            const li = document.createElement('li');
            li.textContent = rec;
            historyList.appendChild(li);
        });
    }

    async function spin() {
        if (isSpinning) return;
        if (balance < betAmount) {
            alert('余额不足');
            return;
        }
        isSpinning = true;
        balance -= betAmount;
        updateUI();

        let spinCount = 0;
        const maxSpins = 16;
        const finalIndices = [
            Math.floor(Math.random() * 3),
            Math.floor(Math.random() * 3),
            Math.floor(Math.random() * 3)
        ];

        const interval = setInterval(() => {
            for (let i = 0; i < 3; i++) {
                const randomIdx = Math.floor(Math.random() * 3);
                updateReelOffset(i, randomIdx);
            }
            spinCount++;
            if (spinCount >= maxSpins) {
                clearInterval(interval);
                for (let i = 0; i < 3; i++) {
                    currentIndex[i] = finalIndices[i];
                    updateReelOffset(i, finalIndices[i]);
                }
                const tigers = getCurrentTigers();
                const multiplier = calculateWin(tigers);
                let winAmount = 0;
                if (multiplier > 0) {
                    winAmount = betAmount * multiplier;
                    balance += winAmount;
                    currentScore += winAmount;
                    addHistory(`🎉 中奖 ${winAmount} 分 (${multiplier}倍) 组合: ${tigers[0].name} ${tigers[1].name} ${tigers[2].name}`);
                } else {
                    addHistory(`😞 未中奖 组合: ${tigers[0].name} ${tigers[1].name} ${tigers[2].name}`);
                }
                updateUI();
                isSpinning = false;
                if (autoSpin && balance >= betAmount) {
                    setTimeout(() => spin(), 300);
                }
            }
        }, spinSpeed);
    }

    function updateUI() {
        balanceSpan.innerText = balance;
        scoreSpan.innerText = currentScore;
        totalBetSpan.innerText = betAmount;
    }

    // 事件绑定
    spinBtn.addEventListener('click', () => { if (!isSpinning) spin(); });
    minusBetBtn.addEventListener('click', () => {
        if (betAmount > 10) betAmount -= 10;
        totalBetSpan.innerText = betAmount;
    });
    plusBetBtn.addEventListener('click', () => {
        if (betAmount < 500) betAmount += 10;
        totalBetSpan.innerText = betAmount;
    });
    speedBtn.addEventListener('click', () => {
        spinSpeed = spinSpeed === 70 ? 30 : 70;
        speedBtn.textContent = spinSpeed === 70 ? '⚡ 加速' : '🐢 正常';
    });
    autoBtn.addEventListener('click', () => {
        autoSpin = !autoSpin;
        autoBtn.textContent = autoSpin ? '⏸ 停止' : '🔄 自动旋转';
    });
    historyBtn.addEventListener('click', () => historyModal.classList.add('show'));
    closeHistory.addEventListener('click', () => historyModal.classList.remove('show'));

    renderReels();
    updateUI();
</script>
</body>
</html>
