<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a12;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .app {
            width: 100%;
            max-width: 500px;
            background: #0f0f1a;
            display: flex;
            flex-direction: column;
        }
        /* 上区块 37.5% */
        .panel-top {
            width: 100%;
            height: 37.5vh;
            background: url('slot-top.jpg') center/cover no-repeat;
        }
        /* 中区块 28.1% */
        .panel-mid {
            width: 100%;
            height: 28.1vh;
            background: url('slot-mid.png') center/cover no-repeat;
        }
        /* 下区块 34.4% */
        .panel-bottom {
            width: 100%;
            height: 34.4vh;
            background: url('slot-bottom.jpg') center/cover no-repeat;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="panel-top"></div>
    <div class="panel-mid"></div>
    <div class="panel-bottom"></div>
</div>
</body>
</html>
