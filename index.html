<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a12;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .app {
            width: 500px;
            background: #0f0f1a;
        }
        .panel-top {
            width: 500px;
            height: 375px;
            background: #1a1a2a;
        }
        .panel-mid {
            width: 500px;
            height: 281px;
            background: #13131f;
        }
        .panel-bottom {
            width: 500px;
            height: 282px;
            background: #1a1a2a;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="panel-top"></div>
    <div class="panel-mid"></div>
    <div class="panel-bottom"></div>
</div>
</body>
</html>
