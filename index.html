

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>老虎机 | 单向转轴 透明按钮</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0a0a12;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        /* 主容器宽度固定500，高度100vh，三块用flex比例 */
        .app {
            width: 500px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #0f0f1a;
        }
        /* 三大板块：完全由背景图决定，无额外背景色 */
        .panel-top {
            flex: 37.5;
            background: url('slot-top.jpg') center/cover no-repeat;
        }
        .panel-mid {
            flex: 28.1;
            background: url('slot-mid.png') center/cover no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            position: relative;
        }
        .panel-bottom {
            flex: 34.4;
            background: url('slot-bottom.jpg') center/cover no-repeat;
            position: relative;
        }
        /* 滚轮样式 - 只负责显示老虎，无额外装饰 */
        .reel {
            width: 90px;
            height: 120px;
            background: rgba(0,0,0,0.4);
            overflow: hidden;
        }
        .reel-strip {
            display: flex;
            flex-direction: column;
            will-change: transform;
        }
        .reel-item {
            width: 90px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .reel-img {
            width: 120px;
            height: 120px;
            object-fit: contain;
        }
        /* 固定中奖线，只做视觉指示 */
        .win-line {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, #ffd700, #ffaa33, #ffd700, transparent);
            pointer-events: none;
            transform: translateY(-50%);
        }
        /* 信息栏：余额/得分/总押分 - 置于底部板块上部 */
        .info-bar {
            position: absolute;
            top: 18%;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            padding: 0 20px;
            color: #ffd966;
            font-size: 0.9rem;
            font-weight: bold;
            text-shadow: 0 0 2px black;
        }
        .info-bar span {
            font-size: 1.1rem;
            margin-left: 5px;
        }
        /* 底部控制区 - 完全透明按钮，精确覆盖背景图设计位置 */
        .button-panel {
            position: absolute;
            bottom: 12%;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 18px;
            padding: 0 20px;
        }
        .left-group, .right-group {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .trans-btn {
            background: transparent;
            border: none;
            font-size: 0.9rem;
            font-weight: bold;
            color: #ffd966;
            text-shadow: 0 0 2px black;
            cursor: pointer;
            padding: 8px 12px;
            min-width: 48px;
            transition: 0.05s linear;
        }
        .trans-btn:active {
            transform: scale(0.96);
        }
        .big-spin {
            background: transparent;
            border: none;
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffd966;
            text-shadow: 0 0 3px black;
            cursor: pointer;
            padding: 8px 20px;
        }
        .big-spin:active {
            transform: scale(0.96);
        }
        .adj-btn {
            font-size: 1.4rem;
            padding: 8px 14px;
        }
        /* 历史弹窗 */
        .history-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
        }
        .history-modal.show { visibility: visible; }
        .history-content {
            background: #1e1e2e;
            border-radius: 16px;
            padding: 20px;
            width: 280px;
            max-height: 70%;
            overflow-y: auto;
            border: 1px solid #ffd966;
            color: #ffd966;
        }
        .history-list { list-style: none; padding: 0; font-size: 0.75rem; }
        .history-list li { padding: 6px; border-bottom: 1px solid #ffd96644; }
        .close-history { margin-top: 15px; background: #ffcf6e; border: none; padding: 8px; width: 100%; border-radius: 30px; cursor: pointer; }
    </style>
</head>
<body>
<div class="app">
    <div class="panel-top"></div>
    <div class="panel-mid">
        <div class="reel" id="reel0"><div class="reel-strip" id="strip0"></div></div>
        <div class="reel" id="reel1"><div class="reel-strip" id="strip1"></div></div>
        <div class="reel" id="reel2"><div class="reel-strip" id="strip2"></div></div>
        <div class="win-line"></div>
    </div>
    <div class="panel-bottom">
        <div class="info-bar">
            <div>💰 余额 <span id="balance">1000</span></div>
            <div>🏆 得分 <span id="score">0</span></div>
            <div>🎲 总押分 <span id="totalBet">20</span></div>
        </div>
        <div class="button-panel">
            <div class="left-group">
                <button class="trans-btn" id="speedBtn">⚡加速</button>
                <button class="trans-btn" id="autoBtn">🔄自动</button>
            </div>
            <button class="trans-btn adj-btn" id="minusBet">-</button>
            <button class="big-spin" id="spinBtn">🎰旋转</button>
            <button class="trans-btn adj-btn" id="plusBet">+</button>
            <div class="right-group">
                <button class="trans-btn" id="historyBtn">📜历史</button>
            </div>
        </div>
    </div>
</div>
<div id="historyModal" class="history-modal">
    <div class="history-content">
        <h3 style="margin-bottom:12px">📜开奖记录</h3>
        <ul class="history-list" id="historyList"></ul>
        <button class="close-history" id="closeHistory">关闭</button>
    </div>
</div>

<script>
    // ----- 老虎数据 -----
    const TIGERS = {
        green: { name:'绿虎', color:'green', img:'tiger-green.png', mult:28 },
        red:   { name:'红虎', color:'red',   img:'tiger-red.png',   mult:58 },
        gold:  { name:'金虎', color:'gold',  img:'tiger-gold.png',  mult:88 }
    };
    const LIST = [TIGERS.green, TIGERS.red, TIGERS.gold];
    function rand() { return LIST[Math.floor(Math.random()*3)]; }
    function makeStrip() { return [rand(), rand(), rand()]; }

    let strips = [makeStrip(), makeStrip(), makeStrip()];
    let offsets = [1, 1, 1];      // 当前显示中间索引
    let balance = 1000, score = 0, bet = 20;
    let spinning = false;
    let autoFlag = false;
    let speedFactor = 1;           // 1正常，0.5加速

    const stripDivs = [
        document.getElementById('strip0'),
        document.getElementById('strip1'),
        document.getElementById('strip2')
    ];

    function renderReel(idx) {
        const s = strips[idx];
        const cont = stripDivs[idx];
        cont.innerHTML = '';
        for (let i = 0; i < 3; i++) {
            const item = document.createElement('div');
            item.className = 'reel-item';
            const img = document.createElement('img');
            img.className = 'reel-img';
            img.src = s[i].img;
            item.appendChild(img);
            cont.appendChild(item);
        }
        cont.style.transform = `translateY(${-offsets[idx] * 120}px)`;
    }

    function updateUI() {
        document.getElementById('balance').innerText = balance;
        document.getElementById('score').innerText = score;
        document.getElementById('totalBet').innerText = bet;
    }

    // 单向向下滚动（永不回头）
    function animateReel(idx, baseDuration, finalOffset, finalStrip) {
        const duration = baseDuration * speedFactor;
        return new Promise((resolve) => {
            let step = 0;
            const steps = 20;
            let curOff = offsets[idx];
            const delay = duration / steps;
            function tick() {
                if (step >= steps) {
                    strips[idx] = finalStrip;
                    offsets[idx] = finalOffset;
                    renderReel(idx);
                    resolve();
                    return;
                }
                curOff = (curOff + 1) % 3;
                offsets[idx] = curOff;
                renderReel(idx);
                step++;
                setTimeout(tick, delay);
            }
            tick();
        });
    }

    // 历史记录
    let historyList = [];
    const historyUl = document.getElementById('historyList');
    function addHistory(msg) {
        historyList.unshift(msg);
        if (historyList.length > 20) historyList.pop();
        historyUl.innerHTML = '';
        historyList.forEach(h => {
            const li = document.createElement('li');
            li.textContent = h;
            historyUl.appendChild(li);
        });
    }

    async function spin() {
        if (spinning) return;
        if (balance < bet) {
            if (autoFlag) autoFlag = false;
            alert('余额不足');
            return;
        }
        spinning = true;
        balance -= bet;
        updateUI();

        const finalStrips = [makeStrip(), makeStrip(), makeStrip()];
        const finalOffsets = [1, 1, 1];
        const baseDurs = [600, 900, 1200];
        const promises = [];
        for (let i = 0; i < 3; i++) {
            promises.push(animateReel(i, baseDurs[i], finalOffsets[i], finalStrips[i]));
        }
        await Promise.all(promises);

        const t0 = strips[0][1], t1 = strips[1][1], t2 = strips[2][1];
        let mult = (t0.color === t1.color && t1.color === t2.color) ? t0.mult : 8;
        let win = bet * mult;
        if (win > 0) {
            balance += win;
            score += win;
            addHistory(`🎉中奖 +${win} (${mult}倍) ${t0.name} ${t1.name} ${t2.name}`);
        } else {
            addHistory(`😞未中奖 ${t0.name} ${t1.name} ${t2.name}`);
        }
        updateUI();
        spinning = false;
        if (autoFlag && balance >= bet) setTimeout(() => spin(), 200);
        else if (autoFlag && balance < bet) autoFlag = false;
    }

    // 绑定透明按钮
    document.getElementById('minusBet').onclick = () => { if (bet > 10) { bet -= 10; updateUI(); } };
    document.getElementById('plusBet').onclick  = () => { if (bet < 500) { bet += 10; updateUI(); } };
    document.getElementById('spinBtn').onclick = () => { if (!spinning) spin(); };
    document.getElementById('speedBtn').onclick = () => {
        speedFactor = speedFactor === 1 ? 0.5 : 1;
        document.getElementById('speedBtn').innerText = speedFactor === 1 ? '⚡加速' : '🐢正常';
    };
    document.getElementById('autoBtn').onclick = () => {
        autoFlag = !autoFlag;
        document.getElementById('autoBtn').innerText = autoFlag ? '⏸停止' : '🔄自动';
        if (autoFlag && !spinning && balance >= bet) spin();
    };
    const modal = document.getElementById('historyModal');
    document.getElementById('historyBtn').onclick = () => modal.classList.add('show');
    document.getElementById('closeHistory').onclick = () => modal.classList.remove('show');

    for (let i = 0; i < 3; i++) renderReel(i);
    updateUI();
</script>
</body>
</html>
