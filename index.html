<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>老虎机 | 无弹窗</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0a0a12;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .app {
            width: 500px;
            height: 100vh;
            background: #0f0f1a;
            display: flex;
            flex-direction: column;
            box-shadow: inset 0 0 0 2px #2a2a3a, 0 10px 20px rgba(0,0,0,0.5);
        }
        .panel-top {
            flex: 36.5;
            background: url('slot-top.jpg') center/cover no-repeat;
            border-bottom: 1px solid #2a2a3a;
            box-shadow: inset 0 0 0 1px #3a3a4a;
        }
        .panel-mid {
            flex: 27.1;
            background: url('slot-mid.png') center/cover no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            position: relative;
            border-bottom: 1px solid #2a2a3a;
            box-shadow: inset 0 0 0 1px #3a3a4a;
        }
        .panel-bottom {
            flex: 33.4;
            background: url('slot-bottom.jpg') center/cover no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 12px;
            box-shadow: inset 0 0 0 1px #3a3a4a;
        }
        .reel {
            width: 150px;
            height: 120px;
            background: rgba(0,0,0,0.6);
            overflow: hidden;
            box-shadow: inset 0 0 0 2px #ffd96688, 0 2px 6px black;
        }
        .reel-strip {
            display: flex;
            flex-direction: column;
            transition: transform 0.05s linear;
        }
        .reel-item {
            width: 150px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .reel-img {
            width: 148px;
            height: 148px;
            object-fit: contain;
        }
        .win-line {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, #ffd700, #ffaa33, #ffd700, transparent);
            pointer-events: none;
            transform: translateY(-50%);
            box-shadow: 0 0 4px #ffaa66;
        }
        .info {
            display: flex;
            gap: 20px;
            background: rgba(0,0,0,0.65);
            padding: 8px 20px;
            color: #ffd966;
            font-size: 0.8rem;
            border: 1px solid #3a3a4a;
        }
        .info span {
            font-weight: bold;
            margin-left: 6px;
        }
        .bet {
            display: flex;
            gap: 15px;
            background: rgba(0,0,0,0.65);
            padding: 5px 16px;
            border: 1px solid #3a3a4a;
        }
        .bet button {
            background: #2a2a3a;
            border: none;
            width: 40px;
            height: 40px;
            font-size: 1.4rem;
            font-weight: bold;
            color: #ffd966;
            cursor: pointer;
        }
        .bet button:active { transform: translateY(1px); }
        .spin {
            background: radial-gradient(circle at 30% 20%, #ffcf6e, #be691f);
            border: none;
            width: 160px;
            padding: 10px 0;
            font-size: 1.2rem;
            font-weight: bold;
            color: #2d1e09;
            cursor: pointer;
            box-shadow: 0 4px 0 #784818;
            transition: 0.05s linear;
        }
        .spin:active { transform: translateY(2px); box-shadow: 0 1px 0 #784818; }
        .reel, .info, .bet, .spin, .panel-top, .panel-mid, .panel-bottom {
            border-radius: 0px;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="panel-top"></div>
    <div class="panel-mid">
        <div class="reel" id="reel0"><div class="reel-strip" id="strip0"></div></div>
        <div class="reel" id="reel1"><div class="reel-strip" id="strip1"></div></div>
        <div class="reel" id="reel2"><div class="reel-strip" id="strip2"></div></div>
        <div class="win-line"></div>
    </div>
    <div class="panel-bottom">
        <div class="info">
            <div>💰 余额 <span id="balance">1000</span></div>
            <div>🏆 得分 <span id="score">0</span></div>
            <div>🎲 押分 <span id="betAmount">20</span></div>
        </div>
        <div class="bet">
            <button id="minus">−</button>
            <span style="width:60px;text-align:center;color:#ffd966;">20</span>
            <button id="plus">+</button>
        </div>
        <button class="spin" id="spinBtn">🎰 旋转 🎰</button>
    </div>
</div>

<script>
    const TIGERS = {
        green: { name:'绿虎', color:'green', img:'tiger-green.png', mult:28 },
        red:   { name:'红虎', color:'red',   img:'tiger-red.png',   mult:58 },
        gold:  { name:'金虎', color:'gold',  img:'tiger-gold.png',  mult:88 }
    };
    const LIST = [TIGERS.green, TIGERS.red, TIGERS.gold];
    function rand() { return LIST[Math.floor(Math.random()*3)]; }
    function makeStrip() { return [rand(), rand(), rand()]; }

    let strips = [makeStrip(), makeStrip(), makeStrip()];
    let offsets = [1,1,1];
    let balance = 1000, score = 0, bet = 20;
    let spinning = false;

    const stripDivs = [document.getElementById('strip0'), document.getElementById('strip1'), document.getElementById('strip2')];

    function renderReel(i) {
        const s = strips[i];
        const div = stripDivs[i];
        div.innerHTML = '';
        for(let j=0;j<3;j++) {
            const item = document.createElement('div');
            item.className = 'reel-item';
            const img = document.createElement('img');
            img.className = 'reel-img';
            img.src = s[j].img;
            item.appendChild(img);
            div.appendChild(item);
        }
        div.style.transform = `translateY(${-offsets[i]*120}px)`;
    }

    function updateUI() {
        document.getElementById('balance').innerText = balance;
        document.getElementById('score').innerText = score;
        document.getElementById('betAmount').innerText = bet;
        document.querySelector('.bet span').innerText = bet;
    }

    async function spin() {
        if(spinning) return;
        if(balance < bet) {
            // 余额不足提示使用 alert 但用户未明确要求删除余额不足提示，但为了保持一致也可以删除？用户只说删除中奖弹窗，余额不足保留吧。但为符合无打扰，也可以静默。按用户要求只删除中奖弹窗。
            alert('余额不足');
            return;
        }
        spinning = true;
        balance -= bet;
        updateUI();

        const finalStrips = [makeStrip(), makeStrip(), makeStrip()];
        const finalOffsets = [1,1,1];
        const delays = [0, 500, 1000];
        let done = 0;

        function startReel(idx, delay) {
            setTimeout(() => {
                let frames = 0;
                const maxFrames = 12;
                function step() {
                    if(frames < maxFrames) {
                        offsets[idx] = (offsets[idx] + 1) % 3;
                        renderReel(idx);
                        frames++;
                        requestAnimationFrame(step);
                    } else {
                        strips[idx] = finalStrips[idx];
                        offsets[idx] = finalOffsets[idx];
                        renderReel(idx);
                        done++;
                        if(done === 3) {
                            const t0 = strips[0][1];
                            const t1 = strips[1][1];
                            const t2 = strips[2][1];
                            let mult = (t0.color===t1.color && t1.color===t2.color) ? t0.mult : 8;
                            let win = bet * mult;
                            if(win>0) {
                                balance += win;
                                score += win;
                                // 中奖弹窗已删除
                            }
                            updateUI();
                            spinning = false;
                        }
                    }
                }
                step();
            }, delay);
        }

        startReel(0, delays[0]);
        startReel(1, delays[1]);
        startReel(2, delays[2]);
    }

    document.getElementById('minus').onclick = () => { if(bet>10) { bet-=10; updateUI(); } };
    document.getElementById('plus').onclick = () => { if(bet<500) { bet+=10; updateUI(); } };
    document.getElementById('spinBtn').onclick = spin;

    for(let i=0;i<3;i++) renderReel(i);
    updateUI();
</script>
</body>
</html>
