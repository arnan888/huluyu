<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>双虎帝王 | 两轴三虎</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-image: url('bg.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        /* 主容器 800x800 */
        .app {
            width: 800px;
            height: 800px;
            display: flex;
            flex-direction: column;
            background: transparent;
        }

        /* 顶部UI区 280px */
        .top-area {
            height: 280px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            background: transparent;
        }

        .game-title {
            text-align: center;
            margin-bottom: 15px;
        }
        .game-title h1 {
            color: #ffd700;
            font-size: 1.8rem;
            text-shadow: 0 0 10px #ff6600;
        }
        .game-title p {
            color: #ffcc88;
            font-size: 0.8rem;
        }

        .jackpot-area {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            border-radius: 30px;
            padding: 12px;
            text-align: center;
            margin-bottom: 15px;
        }
        .jackpot-value {
            color: #ffd700;
            font-size: 1.8rem;
            font-weight: bold;
        }

        .guide-text {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            border-radius: 20px;
            padding: 10px;
            display: flex;
            justify-content: space-around;
            font-size: 0.8rem;
            color: #ddccaa;
        }
        .guide-text span {
            color: #ffcc66;
        }

        /* 中间开奖区 240px （卷轴总高240，窗口显示中间120） */
        .middle-area {
            height: 240px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background: transparent;
        }

        .reels-container {
            display: flex;
            gap: 1px;               /* 两个卷轴间隔1px */
            background: transparent;
        }

        /* 单个卷轴容器，宽200px，高240px，带底板背景 */
        .reel {
            width: 200px;
            height: 240px;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            overflow: hidden;       /* 隐藏超出部分，实现裁剪 */
            position: relative;
        }
        .reel-left {
            background-image: url('slot-left.png');
        }
        .reel-right {
            background-image: url('slot-right.png');
        }

        /* 内部卷轴条，垂直排列三个老虎 */
        .reel-strip {
            display: flex;
            flex-direction: column;
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            will-change: transform;
        }

        /* 每个老虎容器 */
        .tiger-item {
            width: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 上老虎（只显示上半部分） */
        .tiger-top {
            height: 60px;           /* 120的一半 */
            overflow: hidden;
            position: relative;
        }
        .tiger-top img {
            width: 120px;
            height: 120px;
            object-fit: contain;
            margin-top: 0;
            transform: translateY(0);
        }
        /* 只显示上半部分技巧：父容器高60，图片顶部对齐 */
        .tiger-top {
            line-height: 0;
        }
        .tiger-top img {
            margin-top: 0;
        }

        /* 中间老虎（完整显示） */
        .tiger-mid {
            height: 120px;
        }
        .tiger-mid img {
            width: 120px;
            height: 120px;
            object-fit: contain;
        }

        /* 下老虎（只显示下半部分） */
        .tiger-bottom {
            height: 60px;
            overflow: hidden;
            position: relative;
        }
        .tiger-bottom img {
            width: 120px;
            height: 120px;
            object-fit: contain;
            margin-top: -60px;      /* 向上偏移，只显示下半部分 */
        }

        /* 中奖线（在老虎后面） */
        .win-line {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, transparent, #ffd700, #ffaa33, #ffd700, transparent);
            box-shadow: 0 0 12px #ffaa66;
            transform: translateY(-50%);
            z-index: 5;
            pointer-events: none;
        }

        /* 底部操控区 280px */
        .bottom-area {
            height: 280px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            background: transparent;
        }

        .stats-row {
            display: flex;
            gap: 10px;
            height: 70px;
            margin-bottom: 20px;
        }
        .stat-box {
            flex: 1;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .stat-label {
            font-size: 0.7rem;
            color: #ffcc88;
        }
        .stat-value {
            font-size: 1.6rem;
            font-weight: bold;
            color: #ffd700;
        }

        .buttons-row {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        .small-btn {
            flex: 1;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            border: 1px solid #ffd70066;
            padding: 10px 0;
            border-radius: 40px;
            color: #ffdd99;
            font-weight: bold;
            cursor: pointer;
        }
        .small-btn:active { transform: scale(0.97); }

        .main-button-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }
        .adjust-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(0,0,0,0.7);
            border: 2px solid #ffd700;
            font-size: 2rem;
            font-weight: bold;
            color: #ffd700;
            cursor: pointer;
        }
        .adjust-btn:active { transform: scale(0.95); }

        .spin-main {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #2a8a4a, #0a4a2a);
            border: 4px solid #ffd700;
            box-shadow: 0 0 20px #ffd70066;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
        }
        .spin-main:active { transform: scale(0.96); }

        /* 历史弹窗 */
        .history-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
        }
        .history-modal.show { visibility: visible; }
        .history-content {
            background: #1e1e2e;
            border-radius: 40px;
            padding: 20px;
            width: 400px;
            max-height: 500px;
            overflow-y: auto;
            border: 2px solid #ffd700;
        }
        .history-list {
            list-style: none;
            padding: 0;
        }
        .history-list li {
            padding: 8px;
            border-bottom: 1px solid #ffd70044;
            color: #ffdd99;
        }
        .close-history {
            margin-top: 15px;
            padding: 8px;
            background: #ffd700;
            border: none;
            border-radius: 30px;
            width: 100%;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="top-area">
        <div class="game-title">
            <h1>🐅 双虎帝王 🐅</h1>
            <p>两轴三虎 · 中排中奖 · 同色大奖</p>
        </div>
        <div class="jackpot-area">
            <div class="jackpot-label">💎 大奖池 💎</div>
            <div class="jackpot-value" id="jackpot">8888</div>
        </div>
        <div class="guide-text">
            <span>🐯 绿虎 28倍</span> <span>🐅 红虎 58倍</span> <span>👑 金虎 88倍</span>
        </div>
    </div>

    <div class="middle-area">
        <div class="reels-container" id="reelsContainer">
            <!-- 左右卷轴 js 生成 -->
        </div>
        <div class="win-line"></div>
    </div>

    <div class="bottom-area">
        <div class="stats-row">
            <div class="stat-box"><span class="stat-label">💰 余额</span><span class="stat-value" id="balance">1000</span></div>
            <div class="stat-box"><span class="stat-label">🏆 得分</span><span class="stat-value" id="score">0</span></div>
            <div class="stat-box"><span class="stat-label">🎲 押分</span><span class="stat-value" id="totalBet">20</span></div>
        </div>
        <div class="buttons-row">
            <button class="small-btn" id="historyBtn">📜 记录</button>
            <button class="small-btn" id="speedBtn">⚡ 加速</button>
            <button class="small-btn" id="autoBtn">🔄 自动</button>
        </div>
        <div class="main-button-area">
            <button class="adjust-btn" id="minusBet">−</button>
            <div class="spin-main" id="spinBtn">🎰</div>
            <button class="adjust-btn" id="plusBet">+</button>
        </div>
    </div>
</div>

<div id="historyModal" class="history-modal">
    <div class="history-content">
        <h3 style="color:#ffd700">📜 开奖记录</h3>
        <ul class="history-list" id="historyList"></ul>
        <button class="close-history" id="closeHistory">关闭</button>
    </div>
</div>

<script>
    // 老虎配置
    const TIGERS = {
        green: { name: '绿虎', color: 'green', img: 'tiger-green.png', multiplier: 28 },
        red:   { name: '红虎', color: 'red', img: 'tiger-red.png', multiplier: 58 },
        gold:  { name: '金虎', color: 'gold', img: 'tiger-gold.png', multiplier: 88 }
    };
    const TIGER_LIST = [TIGERS.green, TIGERS.red, TIGERS.gold];

    function randomTiger() {
        return TIGER_LIST[Math.floor(Math.random() * 3)];
    }

    // 每个卷轴生成三个老虎（上中下）
    function generateReelStrip() {
        return [randomTiger(), randomTiger(), randomTiger()];
    }

    let leftStrip = generateReelStrip();   // [上, 中, 下]
    let rightStrip = generateReelStrip();
    let currentLeftMidIndex = 1;   // 中间索引固定为1
    let currentRightMidIndex = 1;

    let balance = 1000;
    let currentScore = 0;
    let betAmount = 20;
    let isSpinning = false;
    let autoSpin = false;
    let spinSpeed = 70;      // 毫秒
    let historyRecords = [];

    // DOM 元素
    const reelsContainer = document.getElementById('reelsContainer');
    const balanceSpan = document.getElementById('balance');
    const scoreSpan = document.getElementById('score');
    const totalBetSpan = document.getElementById('totalBet');
    const spinBtn = document.getElementById('spinBtn');
    const minusBetBtn = document.getElementById('minusBet');
    const plusBetBtn = document.getElementById('plusBet');
    const speedBtn = document.getElementById('speedBtn');
    const autoBtn = document.getElementById('autoBtn');
    const historyBtn = document.getElementById('historyBtn');
    const historyModal = document.getElementById('historyModal');
    const historyList = document.getElementById('historyList');
    const closeHistory = document.getElementById('closeHistory');

    let leftStripDiv = null;
    let rightStripDiv = null;

    function renderReels() {
        reelsContainer.innerHTML = '';
        // 左卷轴
        const leftReel = document.createElement('div');
        leftReel.className = 'reel reel-left';
        const leftStrip = document.createElement('div');
        leftStrip.className = 'reel-strip';
        for (let i = 0; i < 3; i++) {
            const tiger = leftStripData[i];
            const itemDiv = document.createElement('div');
            if (i === 0) itemDiv.className = 'tiger-item tiger-top';
            else if (i === 1) itemDiv.className = 'tiger-item tiger-mid';
            else itemDiv.className = 'tiger-item tiger-bottom';
            const img = document.createElement('img');
            img.src = tiger.img;
            img.alt = tiger.name;
            itemDiv.appendChild(img);
            leftStrip.appendChild(itemDiv);
        }
        leftReel.appendChild(leftStrip);
        reelsContainer.appendChild(leftReel);
        leftStripDiv = leftStrip;

        // 右卷轴
        const rightReel = document.createElement('div');
        rightReel.className = 'reel reel-right';
        const rightStrip = document.createElement('div');
        rightStrip.className = 'reel-strip';
        for (let i = 0; i < 3; i++) {
            const tiger = rightStripData[i];
            const itemDiv = document.createElement('div');
            if (i === 0) itemDiv.className = 'tiger-item tiger-top';
            else if (i === 1) itemDiv.className = 'tiger-item tiger-mid';
            else itemDiv.className = 'tiger-item tiger-bottom';
            const img = document.createElement('img');
            img.src = tiger.img;
            img.alt = tiger.name;
            itemDiv.appendChild(img);
            rightStrip.appendChild(itemDiv);
        }
        rightReel.appendChild(rightStrip);
        reelsContainer.appendChild(rightReel);
        rightStripDiv = rightStrip;

        // 初始偏移：显示中间老虎（偏移 -120px，因为每个老虎高度不同：上60+中120+下60，总高240，中间位置在 60 处，偏移 -60 使中间老虎在窗口中央？要准确：窗口显示中间120区域，中间老虎的起始位置是60，我们需要将条向上移动60，使中间老虎进入窗口。但简单起见，我们保证显示中间索引1即可：偏移量 = - (上老虎高度) = -60)
        updateReelOffset(leftStripDiv, 1);
        updateReelOffset(rightStripDiv, 1);
    }

    function updateReelOffset(strip, midIndex) {
        if (!strip) return;
        // 上老虎高60，中老虎高120，下老虎高60。当显示中间老虎（索引1）时，偏移 = -60px
        // 索引0（上）偏移0，索引2（下）偏移 -180
        let offset = 0;
        if (midIndex === 1) offset = -60;
        else if (midIndex === 2) offset = -180;
        strip.style.transform = `translateY(${offset}px)`;
    }

    function getCurrentMidTigers() {
        return {
            left: leftStripData[1],
            right: rightStripData[1]
        };
    }

    function calculateWin(leftTiger, rightTiger) {
        if (leftTiger.color === rightTiger.color) {
            return leftTiger.multiplier;
        }
        return 0;
    }

    function addHistory(msg) {
        historyRecords.unshift(msg);
        if (historyRecords.length > 20) historyRecords.pop();
        historyList.innerHTML = '';
        historyRecords.forEach(rec => {
            const li = document.createElement('li');
            li.textContent = rec;
            historyList.appendChild(li);
        });
    }

    function updateUI() {
        balanceSpan.innerText = balance;
        scoreSpan.innerText = currentScore;
        totalBetSpan.innerText = betAmount;
    }

    async function spin() {
        if (isSpinning) return;
        if (balance < betAmount) {
            alert('余额不足');
            return;
        }
        isSpinning = true;
        balance -= betAmount;
        updateUI();

        let spinCount = 0;
        const maxSpins = 12;
        let finalLeftStrip = null;
        let finalRightStrip = null;

        const interval = setInterval(() => {
            // 动画阶段随机变化
            const tempLeft = generateReelStrip();
            const tempRight = generateReelStrip();
            // 更新显示
            updateStripImages(leftStripDiv, tempLeft);
            updateStripImages(rightStripDiv, tempRight);
            spinCount++;
            if (spinCount >= maxSpins) {
                clearInterval(interval);
                finalLeftStrip = generateReelStrip();
                finalRightStrip = generateReelStrip();
                leftStripData = finalLeftStrip;
                rightStripData = finalRightStrip;
                updateStripImages(leftStripDiv, finalLeftStrip);
                updateStripImages(rightStripDiv, finalRightStrip);
                // 确保偏移在中间
                updateReelOffset(leftStripDiv, 1);
                updateReelOffset(rightStripDiv, 1);

                const midLeft = leftStripData[1];
                const midRight = rightStripData[1];
                const multiplier = calculateWin(midLeft, midRight);
                if (multiplier > 0) {
                    const winAmount = betAmount * multiplier;
                    balance += winAmount;
                    currentScore += winAmount;
                    updateUI();
                    addHistory(`🎉 中奖 ${winAmount} 分 (${multiplier}倍) ${midLeft.name}+${midRight.name}`);
                } else {
                    addHistory(`😞 未中奖 ${midLeft.name}+${midRight.name}`);
                }
                isSpinning = false;
                if (autoSpin && balance >= betAmount) {
                    setTimeout(() => spin(), 300);
                }
            }
        }, spinSpeed);
    }

    function updateStripImages(stripDiv, stripData) {
        if (!stripDiv) return;
        const items = stripDiv.children;
        for (let i = 0; i < 3; i++) {
            const img = items[i].querySelector('img');
            if (img) {
                img.src = stripData[i].img;
                img.alt = stripData[i].name;
            }
        }
    }

    // 初始化数据
    let leftStripData = generateReelStrip();
    let rightStripData = generateReelStrip();

    renderReels();

    spinBtn.addEventListener('click', () => { if (!isSpinning) spin(); });
    minusBetBtn.addEventListener('click', () => { if (betAmount > 10) betAmount -= 10; totalBetSpan.innerText = betAmount; });
    plusBetBtn.addEventListener('click', () => { if (betAmount < 500) betAmount += 10; totalBetSpan.innerText = betAmount; });
    speedBtn.addEventListener('click', () => { spinSpeed = spinSpeed === 70 ? 30 : 70; speedBtn.textContent = spinSpeed === 70 ? '⚡ 加速' : '🐢 正常'; });
    autoBtn.addEventListener('click', () => { autoSpin = !autoSpin; autoBtn.textContent = autoSpin ? '⏸ 停止' : '🔄 自动'; });
    historyBtn.addEventListener('click', () => historyModal.classList.add('show'));
    closeHistory.addEventListener('click', () => historyModal.classList.remove('show'));

    updateUI();
</script>
</body>
</html>
