<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>老虎机 | 向下单向滚动 永不后退</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0a0a12;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .app {
            width: 500px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .panel-top {
            flex: 37.5;
            background: url('slot-top.jpg') center/cover no-repeat;
        }
        .panel-mid {
            flex: 28.1;
            background: url('slot-mid.png') center/cover no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            position: relative;
        }
        .panel-bottom {
            flex: 34.4;
            background: url('slot-bottom.jpg') center/cover no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 12px;
        }
        .reel {
            width: 90px;
            height: 120px;
            background: rgba(0,0,0,0.5);
            overflow: hidden;
            position: relative;
        }
        .reel-strip {
            display: flex;
            flex-direction: column;
            will-change: transform;
        }
        .reel-item {
            width: 90px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .reel-img {
            width: 75px;
            height: 75px;
            object-fit: contain;
        }
        .win-line {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, #ffd700, #ffaa33, #ffd700, transparent);
            pointer-events: none;
            transform: translateY(-50%);
        }
        .info {
            display: flex;
            justify-content: space-around;
            width: 80%;
            background: rgba(0,0,0,0.45);
            padding: 8px 0;
            color: #ffd966;
            font-size: 0.8rem;
            text-align: center;
        }
        .info div { flex: 1; }
        .info span { font-weight: bold; margin-left: 4px; }
        .bet {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            background: rgba(0,0,0,0.45);
            padding: 8px 20px;
        }
        .bet button {
            background: #2a2a3a;
            border: none;
            width: 40px;
            height: 40px;
            font-size: 1.4rem;
            font-weight: bold;
            color: #ffd966;
            cursor: pointer;
        }
        .bet button:active { transform: translateY(1px); }
        .bet span {
            font-size: 1.2rem;
            font-weight: bold;
            color: #ffd966;
            min-width: 60px;
            text-align: center;
        }
        .spin {
            background: #ffcf6e;
            border: none;
            width: 160px;
            padding: 10px 0;
            font-size: 1.2rem;
            font-weight: bold;
            color: #2d1e09;
            cursor: pointer;
            margin-top: 4px;
        }
        .spin:active { transform: translateY(2px); }
        .reel, .info, .bet, .spin, .panel-top, .panel-mid, .panel-bottom { border-radius: 0px; }
    </style>
</head>
<body>
<div class="app">
    <div class="panel-top"></div>
    <div class="panel-mid">
        <div class="reel" id="reel0"><div class="reel-strip" id="strip0"></div></div>
        <div class="reel" id="reel1"><div class="reel-strip" id="strip1"></div></div>
        <div class="reel" id="reel2"><div class="reel-strip" id="strip2"></div></div>
        <div class="win-line"></div>
    </div>
    <div class="panel-bottom">
        <div class="info">
            <div>💰 余额 <span id="balance">1000</span></div>
            <div>🏆 得分 <span id="score">0</span></div>
            <div>🎲 押分 <span id="betAmount">20</span></div>
        </div>
        <div class="bet">
            <button id="minus">−</button>
            <span id="betValue">20</span>
            <button id="plus">+</button>
        </div>
        <button class="spin" id="spinBtn">🎰 旋转 🎰</button>
    </div>
</div>

<script>
    // ----- 老虎数据 -----
    const TIGERS = {
        green: { name:'绿虎', color:'green', img:'tiger-green.png', mult:28 },
        red:   { name:'红虎', color:'red',   img:'tiger-red.png',   mult:58 },
        gold:  { name:'金虎', color:'gold',  img:'tiger-gold.png',  mult:88 }
    };
    const LIST = [TIGERS.green, TIGERS.red, TIGERS.gold];
    function rand() { return LIST[Math.floor(Math.random()*3)]; }
    function makeStrip() { return [rand(), rand(), rand()]; }

    // 每个转轴的数据：3个老虎（上中下） 和 当前显示的偏移索引（0上,1中,2下）
    let strips = [makeStrip(), makeStrip(), makeStrip()];
    let offsets = [1, 1, 1];
    let balance = 1000, score = 0, bet = 20;
    let spinning = false;

    const stripDivs = [
        document.getElementById('strip0'),
        document.getElementById('strip1'),
        document.getElementById('strip2')
    ];

    // 渲染单个转轴
    function renderReel(idx) {
        const s = strips[idx];
        const container = stripDivs[idx];
        container.innerHTML = '';
        for (let i = 0; i < 3; i++) {
            const item = document.createElement('div');
            item.className = 'reel-item';
            const img = document.createElement('img');
            img.className = 'reel-img';
            img.src = s[i].img;
            item.appendChild(img);
            container.appendChild(item);
        }
        // 根据偏移量平移：每个item高120px
        container.style.transform = `translateY(${-offsets[idx] * 120}px)`;
    }

    function updateUI() {
        document.getElementById('balance').innerText = balance;
        document.getElementById('score').innerText = score;
        document.getElementById('betAmount').innerText = bet;
        document.getElementById('betValue').innerText = bet;
    }

    // 单向向下滚动动画（永不回头）
    // 原理：不停增加偏移量，模3递增，并且每次增加时重新渲染，形成连续向下的感觉
    // 停止时直接跳转到最终偏移，不会回退
    function animateReel(idx, durationMs, finalOffset, finalStrip) {
        return new Promise((resolve) => {
            const startTime = performance.now();
            const totalSteps = 24;          // 总滚动步数
            let step = 0;
            let currentOffset = offsets[idx];

            function stepAnimation() {
                if (step >= totalSteps) {
                    // 结束：直接硬设最终结果（无回退）
                    strips[idx] = finalStrip;
                    offsets[idx] = finalOffset;
                    renderReel(idx);
                    resolve();
                    return;
                }
                // 向下滚动：偏移量 +1 (模3)
                currentOffset = (currentOffset + 1) % 3;
                offsets[idx] = currentOffset;
                renderReel(idx);
                step++;
                // 根据时间总长分配每一帧的延迟，使其在durationMs内完成
                const delay = durationMs / totalSteps;
                setTimeout(stepAnimation, delay);
            }
            stepAnimation();
        });
    }

    async function spin() {
        if (spinning) return;
        if (balance < bet) {
            alert('余额不足');
            return;
        }
        spinning = true;
        balance -= bet;
        updateUI();

        // 预先生成最终结果
        const finalStrips = [makeStrip(), makeStrip(), makeStrip()];
        const finalOffsets = [1, 1, 1];  // 最终都停在中间位置
        // 每个转轴滚动时长：左 600ms，中 900ms，右 1200ms（实现依次停止）
        const durations = [600, 900, 1200];

        // 并行执行三个动画，但使用 Promise.all 等待全部完成
        const promises = [];
        for (let i = 0; i < 3; i++) {
            promises.push(animateReel(i, durations[i], finalOffsets[i], finalStrips[i]));
        }
        await Promise.all(promises);

        // 结算中奖
        const t0 = strips[0][1];
        const t1 = strips[1][1];
        const t2 = strips[2][1];
        let mult = (t0.color === t1.color && t1.color === t2.color) ? t0.mult : 8;
        let win = bet * mult;
        if (win > 0) {
            balance += win;
            score += win;
            // 无弹窗（用户要求删除）
        }
        updateUI();
        spinning = false;
    }

    // 绑定事件
    document.getElementById('minus').onclick = () => { if (bet > 10) { bet -= 10; updateUI(); } };
    document.getElementById('plus').onclick  = () => { if (bet < 500) { bet += 10; updateUI(); } };
    document.getElementById('spinBtn').onclick = spin;

    // 初始化渲染
    for (let i = 0; i < 3; i++) renderReel(i);
    updateUI();
</script>
</body>
</html>
